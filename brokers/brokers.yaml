# ============================================================================
# Broker configurations
# ============================================================================
# Each broker has its own section with connection details, symbol mappings,
# and market hours.
#
# Market hours — P1.2 timezone fix:
#   - All session times are in Eastern Time (America/New_York).
#   - This matches MT5 broker convention: brokers follow US DST rules
#     (UTC+2 standard / UTC+3 daylight), which is America/New_York + 7h.
#   - By using the IANA timezone "America/New_York", the zoneinfo library
#     handles DST transitions automatically — including the 2-week gap
#     between US and EU DST where static UTC+2 would be wrong.
#   - Per-asset-class session definitions with multiple sessions per day.
#   - Empty list [] means market is closed that day.
#
# server_offset_hours (P5.11):
#   - Data timestamps (in parquet files) are in MT5 server time.
#   - MT5 server time = ET + server_offset_hours (always +7h for MT5
#     brokers because both follow US DST rules).
#   - The gap detector uses this offset to convert session break times
#     (defined in ET) to server time for comparison with data timestamps.
#   - If a broker stores data in ET directly, set server_offset_hours to 0.
#
# Holidays are now sourced dynamically from the calendar_news module
# (FinnhubCalendarManager) — no static list needed in brokers.yaml.
# ============================================================================

